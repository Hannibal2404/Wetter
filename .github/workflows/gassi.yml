name: Gassi-Wetter

on:
  schedule:
    # 2x taeglich (UTC). ~06:00 DE morgens + ~14:00 DE frueher Nachmittag,
    # damit sich aendernde Vorhersagen (Schauer/Boeen) tagsueber aktualisiert werden.
    # (+-1 h je Sommer-/Winterzeit.)
    - cron: "0 4 * * *"
    - cron: "0 12 * * *"
  push:
    branches: [main]        # jeder Push auf main baut + deployt automatisch
  workflow_dispatch: {}   # manuell ausloesbar (Actions-Tab -> Run workflow)

# Rechte fuer den offiziellen GitHub-Pages-Deploy (kein PAT noetig).
permissions:
  contents: read
  pages: write
  id-token: write

# Nie zwei Deploys gleichzeitig; laufende Runs nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Dashboard bauen (+ Morgen-Push beim 06:00-Lauf / manuell)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # Push nur beim Morgen-Cron (04:00 UTC) oder manuellem Lauf zum Testen;
          # der Nachmittags-Cron und Pushs deployen still.
          GASSI_NOTIFY: ${{ (github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch') && '1' || '' }}
        run: python gassi_wetter.py --out ./public

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
