name: Gassi-Wetter

on:
  schedule:
    # GitHub-Cron ist "best effort" und verwirft Laeufe gelegentlich komplett
    # (besonders zur vollen Stunde). Daher: krumme Minuten UND mehrere Versuche.
    # Morgens 3 Anlaeufe (~06:23 / 06:41 / 07:07 DE) - der erste, der
    # durchkommt, schickt den Push; die restlichen erkennen am Dedupe-Marker
    # in der veroeffentlichten Seite, dass heute schon gemeldet wurde.
    - cron: "23 4 * * *"
    - cron: "41 4 * * *"
    - cron: "7 5 * * *"
    # Nachmittags 2 Anlaeufe (~14:23 / 14:41 DE) - nur Aktualisierung, kein Push
    # (liegt ausserhalb des notify_window in der CONFIG).
    - cron: "23 12 * * *"
    - cron: "41 12 * * *"
  push:
    branches: [main]        # jeder Push auf main baut + deployt automatisch
  workflow_dispatch: {}   # manuell ausloesbar (Actions-Tab -> Run workflow)

# Rechte fuer den offiziellen GitHub-Pages-Deploy (kein PAT noetig).
permissions:
  contents: read
  pages: write
  id-token: write

# Nie zwei Deploys gleichzeitig; laufende Runs nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Dashboard bauen (+ Morgen-Push beim 06:00-Lauf / manuell)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # "force" = manueller Lauf, pusht immer (zum Testen).
          # "1"     = geplanter Lauf; ob wirklich gepusht wird, entscheidet das
          #           Skript anhand notify_window + Dedupe-Marker.
          # ""      = Push-Deploys sind still.
          # Bewusst KEIN Vergleich auf Cron-Strings mehr - die mussten sonst an
          # zwei Stellen gepflegt werden und ein Tippfehler haette den Push
          # stillschweigend fuer immer abgeschaltet.
          GASSI_NOTIFY: ${{ github.event_name == 'workflow_dispatch' && 'force' || (github.event_name == 'schedule' && '1' || '') }}
        run: python gassi_wetter.py --out ./public

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
